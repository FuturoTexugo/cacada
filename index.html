<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Caçada — Ficha do Caçador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#12100e;
    --panel:#1c1815;
    --panel-2:#221d18;
    --hairline:rgba(171,122,60,0.28);
    --hairline-soft:rgba(171,122,60,0.14);
    --ink:#e8dfc8;
    --ink-muted:#a89a7d;
    --ink-faint:#786a52;
    --brass:#ab7a3c;
    --brass-bright:#d19a52;
    --blood:#8c3232;
    --blood-bright:#b8493f;
    --verdigris:#4f7268;
    --verdigris-bright:#6b9488;
    --rust:#c1531f;
    --radius:3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, #1a1613 0%, var(--void) 55%);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding-bottom:60px;
    min-height:100vh;
  }
  ::selection{background:var(--brass);color:var(--void);}

  /* ---------- Sticky vitals bar ---------- */
  .vitals-bar{
    position:sticky; top:0; z-index:50;
    background:linear-gradient(180deg, #1a1613 0%, #14110e 100%);
    border-bottom:1px solid var(--hairline);
    padding:10px 14px 12px;
    box-shadow:0 6px 18px -6px rgba(0,0,0,0.6);
  }
  .vitals-top{
    display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;
  }
  .char-name-input{
    background:none; border:none; outline:none;
    font-family:'Cormorant Garamond',serif; font-weight:700;
    font-size:22px; color:var(--ink);
    padding:0; min-width:0; flex:1;
    letter-spacing:0.3px;
  }
  .char-name-input::placeholder{color:var(--ink-faint);}
  .grau-badge{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-bright);
    border:1px solid var(--hairline); border-radius:20px; padding:3px 10px;
    white-space:nowrap; flex-shrink:0;
  }
  .menu-btn{
    background:none; border:1px solid var(--hairline); color:var(--ink-muted);
    border-radius:var(--radius); width:34px; height:34px; font-size:16px; cursor:pointer;
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .menu-btn:active{background:var(--panel-2);}

  .gauge-row{display:flex; gap:10px;}
  .gauge{flex:1; min-width:0;}
  .gauge-label{
    display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace;
    font-size:10px; color:var(--ink-muted); margin-bottom:3px; letter-spacing:0.5px;
  }
  .gauge-track{height:7px; background:#0d0b09; border-radius:20px; overflow:hidden; border:1px solid var(--hairline-soft);}
  .gauge-fill{height:100%; border-radius:20px; transition:width .25s ease;}
  .gauge-fill.pv{background:linear-gradient(90deg,#6e2424,var(--blood-bright));}
  .gauge-fill.razao{background:linear-gradient(90deg,#37554d,var(--verdigris-bright));}

  /* ---------- Layout ---------- */
  .wrap{max-width:640px; margin:0 auto; padding:16px 14px 0;}
  .card{
    background:var(--panel);
    border:1px solid var(--hairline-soft);
    border-radius:var(--radius);
    margin-bottom:16px;
    overflow:hidden;
  }
  .card-head{
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; border-bottom:1px solid var(--hairline-soft);
    background:var(--panel-2);
  }
  .card-seal{
    width:20px; height:20px; border-radius:50%; border:1.5px solid var(--brass);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .card-seal svg{width:11px; height:11px; fill:var(--brass);}
  .card-title{
    font-family:'Cormorant Garamond',serif; font-weight:600; font-size:17px;
    letter-spacing:0.4px; color:var(--ink);
  }
  .card-sub{font-size:11px; color:var(--ink-faint); margin-left:auto; font-family:'IBM Plex Mono',monospace;}
  .card-body{padding:14px;}

  /* ---------- Basic info ---------- */
  .info-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .info-grid.full{grid-template-columns:1fr;}
  .field label{
    display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.8px;
    color:var(--ink-faint); margin-bottom:4px;
  }
  .field input, .field select{
    width:100%; background:#141110; border:1px solid var(--hairline);
    color:var(--ink); border-radius:var(--radius); padding:8px 9px; font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--brass-bright);}

  .xp-row{display:flex; align-items:center; gap:10px; margin-top:12px;}
  .xp-track{flex:1; height:8px; background:#0d0b09; border:1px solid var(--hairline-soft); border-radius:20px; overflow:hidden;}
  .xp-fill{height:100%; background:linear-gradient(90deg,#7d5a26,var(--brass-bright));}
  .xp-text{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-muted); white-space:nowrap;}

  /* ---------- Attributes ---------- */
  .attr-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .attr-card{
    background:#161311; border:1px solid var(--hairline-soft); border-radius:var(--radius);
    padding:10px 12px;
  }
  .attr-top{display:flex; justify-content:space-between; align-items:baseline;}
  .attr-name{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:15px; color:var(--ink);}
  .attr-abbr{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-faint);}
  .stepper{display:flex; align-items:center; gap:8px; margin-top:6px;}
  .step-btn{
    width:28px; height:28px; border-radius:50%; border:1px solid var(--brass);
    background:none; color:var(--brass-bright); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    line-height:1;
  }
  .step-btn:active{background:rgba(171,122,60,0.2);}
  .step-val{
    font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600;
    color:var(--ink); flex:1; text-align:center;
  }
  .pip-row{display:flex; gap:3px; margin-top:8px; flex-wrap:wrap;}
  .pip{
    width:10px; height:10px; clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background:var(--hairline-soft);
  }
  .pip.on{background:var(--brass-bright);}
  .budget-note{
    margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-muted);
    display:flex; justify-content:space-between; border-top:1px dashed var(--hairline-soft); padding-top:8px;
  }
  .budget-note.warn{color:var(--rust);}

  /* ---------- Skills ---------- */
  .skill-group-title{
    font-family:'Cormorant Garamond',serif; font-weight:600; font-size:14px; color:var(--brass-bright);
    margin:16px 0 6px; letter-spacing:0.4px;
  }
  .skill-group-title:first-child{margin-top:0;}
  .skill-row{
    display:flex; align-items:center; gap:8px; padding:6px 0;
    border-bottom:1px solid var(--hairline-soft);
  }
  .skill-row:last-child{border-bottom:none;}
  .skill-name{flex:1; font-size:13.5px; color:var(--ink); min-width:0;}
  .skill-pool{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint);
    white-space:nowrap; min-width:64px; text-align:right;
  }
  .skill-stepper{display:flex; align-items:center; gap:4px;}
  .skill-step-btn{
    width:22px; height:22px; border-radius:50%; border:1px solid var(--hairline);
    background:none; color:var(--ink-muted); font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; line-height:1;
  }
  .skill-step-btn:active{background:var(--panel-2); border-color:var(--brass);}
  .skill-val{
    font-family:'IBM Plex Mono',monospace; font-size:14px; width:18px; text-align:center; color:var(--ink);
  }
  select.attr-pick{
    background:#141110; border:1px solid var(--hairline); color:var(--ink-muted);
    border-radius:var(--radius); font-size:10.5px; padding:2px 4px; font-family:'IBM Plex Mono',monospace;
  }

  /* ---------- Derived resources ---------- */
  .res-block{margin-bottom:16px;}
  .res-block:last-child{margin-bottom:0;}
  .res-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .res-label{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:15px;}
  .res-formula{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-faint);}
  .res-controls{display:flex; align-items:center; gap:10px;}
  .res-current-input{
    width:56px; background:#141110; border:1px solid var(--hairline); color:var(--ink);
    border-radius:var(--radius); padding:6px; font-family:'IBM Plex Mono',monospace; font-size:15px; text-align:center;
  }
  .res-max-tag{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-muted); white-space:nowrap;}
  .res-track{flex:1; height:10px; background:#0d0b09; border:1px solid var(--hairline-soft); border-radius:20px; overflow:hidden;}
  .res-fill{height:100%; transition:width .25s ease;}
  .res-fill.pv{background:linear-gradient(90deg,#6e2424,var(--blood-bright));}
  .res-fill.razao{background:linear-gradient(90deg,#37554d,var(--verdigris-bright));}
  .res-fill.fardo{background:linear-gradient(90deg,#6b5522,var(--brass-bright));}
  .adj-row{display:flex; gap:10px; margin-top:8px;}
  .adj-field{flex:1;}
  .adj-field label{font-size:9.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.6px; display:block; margin-bottom:3px;}
  .adj-field input{
    width:100%; background:#141110; border:1px solid var(--hairline-soft); color:var(--ink-muted);
    border-radius:var(--radius); padding:5px 7px; font-size:12px; font-family:'IBM Plex Mono',monospace;
  }
  .defesa-badge{
    display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace;
    font-size:13px; color:var(--brass-bright); border:1px solid var(--hairline); border-radius:20px;
    padding:5px 12px; margin-top:2px;
  }

  /* ---------- Character menu (slide panel) ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:100;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .overlay.open{opacity:1; pointer-events:auto;}
  .panel{
    position:fixed; top:0; right:0; height:100%; width:min(300px,84vw);
    background:var(--panel); border-left:1px solid var(--hairline); z-index:101;
    transform:translateX(100%); transition:transform .25s ease;
    display:flex; flex-direction:column;
  }
  .panel.open{transform:translateX(0);}
  .panel-head{
    padding:16px 14px; border-bottom:1px solid var(--hairline-soft);
    display:flex; justify-content:space-between; align-items:center;
  }
  .panel-head h3{margin:0; font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600;}
  .panel-close{background:none; border:none; color:var(--ink-muted); font-size:20px; cursor:pointer;}
  .panel-body{padding:12px 14px; overflow-y:auto; flex:1;}
  .char-item{
    display:flex; align-items:center; gap:8px; padding:10px 8px; border-radius:var(--radius);
    cursor:pointer; border:1px solid transparent; margin-bottom:6px;
  }
  .char-item.active{border-color:var(--brass); background:rgba(171,122,60,0.1);}
  .char-item-name{flex:1; font-size:13.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .char-item-del{background:none; border:none; color:var(--ink-faint); font-size:15px; cursor:pointer; padding:2px 6px;}
  .new-char-btn{
    width:100%; padding:10px; background:none; border:1px dashed var(--hairline); color:var(--brass-bright);
    border-radius:var(--radius); font-size:13px; cursor:pointer; margin-top:8px; font-family:'Inter',sans-serif;
  }
  .new-char-btn:active{background:var(--panel-2);}

  .save-indicator{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-faint);
    padding:16px 0 4px; letter-spacing:0.4px;
  }
  .save-indicator.saving{color:var(--brass-bright);}
</style>
</head>
<body>

<div class="vitals-bar">
  <div class="vitals-top">
    <input id="charName" class="char-name-input" placeholder="Nome do Caçador" maxlength="40">
    <span class="grau-badge" id="grauBadge">Grau 1</span>
    <button class="menu-btn" id="openMenu" title="Personagens">☰</button>
  </div>
  <div class="gauge-row">
    <div class="gauge">
      <div class="gauge-label"><span>PV</span><span id="pvGaugeText">0/0</span></div>
      <div class="gauge-track"><div class="gauge-fill pv" id="pvGaugeFill" style="width:0%"></div></div>
    </div>
    <div class="gauge">
      <div class="gauge-label"><span>RAZÃO</span><span id="razaoGaugeText">0/0</span></div>
      <div class="gauge-track"><div class="gauge-fill razao" id="razaoGaugeFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- INFORMAÇÕES BÁSICAS -->
  <div class="card">
    <div class="card-head">
      <div class="card-seal"><svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9 L22 9 L16 13.5 L18 21 L12 16.5 L6 21 L8 13.5 L2 9 L9.5 9 Z"/></svg></div>
      <div class="card-title">A Ficha</div>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="field"><label>Raça</label><input id="race" placeholder="Ex: Humano"></div>
        <div class="field"><label>Arquétipo</label><input id="archetype" placeholder="Ex: Vanguarda"></div>
        <div class="field"><label>Passado</label><input id="past" placeholder="Ex: Ex-Médico Militar"></div>
        <div class="field"><label>Grau</label><input id="grau" type="number" min="1" value="1"></div>
      </div>
      <div class="xp-row">
        <span class="xp-text" id="xpLabel">XP:</span>
        <input id="xpAtual" type="number" min="0" value="0" style="width:56px;background:#141110;border:1px solid var(--hairline);color:var(--ink);border-radius:3px;padding:5px;font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:center;">
        <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
        <span class="xp-text" id="xpNeed">/10</span>
      </div>
    </div>
  </div>

  <!-- ATRIBUTOS -->
  <div class="card">
    <div class="card-head">
      <div class="card-seal"><svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9 L22 9 L16 13.5 L18 21 L12 16.5 L6 21 L8 13.5 L2 9 L9.5 9 Z"/></svg></div>
      <div class="card-title">Atributos Primais</div>
      <div class="card-sub">d12 na pilha</div>
    </div>
    <div class="card-body">
      <div class="attr-grid" id="attrGrid"></div>
      <div class="budget-note" id="attrBudget"></div>
    </div>
  </div>

  <!-- PERÍCIAS -->
  <div class="card">
    <div class="card-head">
      <div class="card-seal"><svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9 L22 9 L16 13.5 L18 21 L12 16.5 L6 21 L8 13.5 L2 9 L9.5 9 Z"/></svg></div>
      <div class="card-title">Perícias</div>
      <div class="card-sub">sucessos garantidos</div>
    </div>
    <div class="card-body" id="skillsBody"></div>
    <div class="card-body" style="padding-top:0;">
      <div class="budget-note" id="skillBudget"></div>
    </div>
  </div>

  <!-- RECURSOS DERIVADOS -->
  <div class="card">
    <div class="card-head">
      <div class="card-seal"><svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9 L22 9 L16 13.5 L18 21 L12 16.5 L6 21 L8 13.5 L2 9 L9.5 9 Z"/></svg></div>
      <div class="card-title">Recursos Derivados</div>
    </div>
    <div class="card-body">

      <div class="res-block">
        <div class="res-head">
          <span class="res-label" style="color:var(--blood-bright);">Pontos de Vida</span>
          <span class="res-formula">8 + (VIG×2) + bônus</span>
        </div>
        <div class="res-controls">
          <input type="number" id="pvCurrent" class="res-current-input" value="0">
          <div class="res-track"><div class="res-fill pv" id="pvFill" style="width:0%"></div></div>
          <span class="res-max-tag" id="pvMaxTag">/ 0</span>
        </div>
        <div class="adj-row">
          <div class="adj-field"><label>Bônus Arquétipo</label><input type="number" id="pvArchBonus" value="0"></div>
          <div class="adj-field"><label>Bônus de Talentos</label><input type="number" id="pvTalentBonus" value="0"></div>
        </div>
      </div>

      <div class="res-block">
        <div class="res-head">
          <span class="res-label" style="color:var(--verdigris-bright);">Razão</span>
          <span class="res-formula">8 + (INS×2) + bônus</span>
        </div>
        <div class="res-controls">
          <input type="number" id="razaoCurrent" class="res-current-input" value="0">
          <div class="res-track"><div class="res-fill razao" id="razaoFill" style="width:0%"></div></div>
          <span class="res-max-tag" id="razaoMaxTag">/ 0</span>
        </div>
        <div class="adj-row">
          <div class="adj-field"><label>Bônus Arquétipo</label><input type="number" id="razaoArchBonus" value="0"></div>
          <div class="adj-field"><label>Bônus de Talentos</label><input type="number" id="razaoTalentBonus" value="0"></div>
        </div>
      </div>

      <div class="res-block">
        <div class="res-head">
          <span class="res-label" style="color:var(--brass-bright);">Fardo</span>
          <span class="res-formula">10 + (FOR×2)</span>
        </div>
        <div class="res-controls">
          <input type="number" id="fardoCurrent" class="res-current-input" value="0">
          <div class="res-track"><div class="res-fill fardo" id="fardoFill" style="width:0%"></div></div>
          <span class="res-max-tag" id="fardoMaxTag">/ 0</span>
        </div>
      </div>

      <div class="res-block" style="margin-bottom:0;">
        <div class="res-head">
          <span class="res-label" style="color:var(--ink);">Defesa</span>
          <span class="res-formula">2 sucessos, exigência varia com DES</span>
        </div>
        <div class="defesa-badge" id="defesaBadge">2 de 5+</div>
      </div>

    </div>
  </div>

  <div class="save-indicator" id="saveIndicator">salvo automaticamente</div>
</div>

<!-- PAINEL DE PERSONAGENS -->
<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="panel-head">
    <h3>Caçadores</h3>
    <button class="panel-close" id="closePanel">✕</button>
  </div>
  <div class="panel-body">
    <div id="charList"></div>
    <button class="new-char-btn" id="newCharBtn">+ Novo Caçador</button>
  </div>
</div>

<script>
// ============ DADOS DO SISTEMA ============
const ATTR_KEYS = ['FOR','DES','VIG','INT','CAR','INS'];
const ATTR_NAMES = {FOR:'Força',DES:'Destreza',VIG:'Vigor',INT:'Intelecto',CAR:'Carisma',INS:'Instinto'};

const SKILL_GROUPS = [
  {attr:'FOR', title:'Força', skills:['Briga','Atletismo']},
  {attr:'DES', title:'Destreza', skills:['Pontaria','Acrobacia','Furtividade','Reflexos','Crime','Pilotagem']},
  {attr:'VIG', title:'Vigor', skills:['Fortitude','Bloqueio']},
  {attr:'INT', title:'Intelecto', skills:['Herbalogia','Monstrologia','Ofícios','Medicina','Conhecimento Acadêmico','Tática','Investigação']},
  {attr:'CAR', title:'Carisma', skills:['Diplomacia','Coerção','Arte','Adestramento']},
  {attr:'INS', title:'Instinto', skills:['Percepção','Rastreio','Sobrevivência','Imbuir','Ancorar','Vontade']},
];

function defaultCharacter(name){
  const attrs = {}; ATTR_KEYS.forEach(k=>attrs[k]=2);
  const skills = {};
  SKILL_GROUPS.forEach(g=>g.skills.forEach(s=>skills[s]=0));
  skills['Combate Armado'] = 0;
  return {
    id: 'char_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    name: name || 'Novo Caçador',
    race:'', archetype:'', past:'', grau:1, xpAtual:0,
    attrs, skills, combateArmadoAttr:'FOR',
    extraAttrPoints:7, extraSkillBonus:0,
    pvCurrent:10, pvArchBonus:0, pvTalentBonus:0,
    razaoCurrent:10, razaoArchBonus:0, razaoTalentBonus:0,
    fardoCurrent:0,
  };
}

// ============ ESTADO ============
let current = null;
let charIndex = []; // [{id,name}]
let saveTimeout = null;

// ============ STORAGE ============
async function loadIndex(){
  try{
    const r = await window.storage.get('char-index', false);
    charIndex = r ? JSON.parse(r.value) : [];
  }catch(e){ charIndex = []; }
}
async function saveIndex(){
  try{ await window.storage.set('char-index', JSON.stringify(charIndex), false); }catch(e){}
}
async function loadCharacter(id){
  try{
    const r = await window.storage.get('char-data:'+id, false);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function saveCharacterNow(){
  if(!current) return;
  const ind = document.getElementById('saveIndicator');
  ind.textContent = 'salvando...'; ind.classList.add('saving');
  try{
    await window.storage.set('char-data:'+current.id, JSON.stringify(current), false);
    await window.storage.set('active-char', current.id, false);
    ind.textContent = 'salvo automaticamente'; ind.classList.remove('saving');
  }catch(e){
    ind.textContent = 'erro ao salvar — tente novamente';
  }
}
function queueSave(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveCharacterNow, 450);
}

// ============ CÁLCULOS ============
function calc(c){
  const pvMax = 8 + c.attrs.VIG*2 + (Number(c.pvArchBonus)||0) + (Number(c.pvTalentBonus)||0);
  const razaoMax = 8 + c.attrs.INS*2 + (Number(c.razaoArchBonus)||0) + (Number(c.razaoTalentBonus)||0);
  const fardoMax = 10 + c.attrs.FOR*2;
  const defesa = c.attrs.DES >= 4 ? '2 de 6+' : '2 de 5+';
  const periciasDisp = 6 + c.attrs.INT + (Number(c.extraSkillBonus)||0);
  let periciasUsadas = 0;
  Object.values(c.skills).forEach(v=>periciasUsadas+=Number(v)||0);
  const attrPointsUsed = ATTR_KEYS.reduce((s,k)=>s+Math.max(0,c.attrs[k]-2),0);
  const xpProximo = 10 + 3*(Math.max(1,c.grau)-1);
  return {pvMax,razaoMax,fardoMax,defesa,periciasDisp,periciasUsadas,attrPointsUsed,xpProximo};
}

function capTierLabel(val, kind){
  // kind: 'attr' or 'skill'
  const t = kind==='attr' ? {c:4,p:6,a:8} : {c:3,p:5,a:7};
  if(val<=t.c) return {label:'criação', color:'var(--ink-faint)'};
  if(val<=t.p) return {label:'permanente', color:'var(--brass-bright)'};
  if(val<=t.a) return {label:'absoluto (talento)', color:'var(--rust)'};
  return {label:'excede teto!', color:'var(--blood-bright)'};
}

// ============ RENDER ============
function renderAttrs(){
  const grid = document.getElementById('attrGrid');
  grid.innerHTML = '';
  ATTR_KEYS.forEach(k=>{
    const val = current.attrs[k];
    const tier = capTierLabel(val,'attr');
    const pips = Array.from({length:Math.min(val,8)},(_,i)=>`<div class="pip on"></div>`).join('')
      + Array.from({length:Math.max(0,8-val)},()=>`<div class="pip"></div>`).join('');
    const div = document.createElement('div');
    div.className = 'attr-card';
    div.innerHTML = `
      <div class="attr-top">
        <span class="attr-name">${ATTR_NAMES[k]}</span>
        <span class="attr-abbr" style="color:${tier.color}">${k} · ${tier.label}</span>
      </div>
      <div class="stepper">
        <button class="step-btn" data-attr="${k}" data-d="-1">−</button>
        <span class="step-val">${val}</span>
        <button class="step-btn" data-attr="${k}" data-d="1">+</button>
      </div>
      <div class="pip-row">${pips}</div>
    `;
    grid.appendChild(div);
  });
  grid.querySelectorAll('.step-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const k = btn.dataset.attr, d = Number(btn.dataset.d);
      current.attrs[k] = Math.max(1, Math.min(12, current.attrs[k]+d));
      renderAll(); queueSave();
    });
  });

  const c = calc(current);
  const remaining = current.extraAttrPoints - c.attrPointsUsed;
  const budgetEl = document.getElementById('attrBudget');
  budgetEl.className = 'budget-note' + (remaining<0?' warn':'');
  budgetEl.innerHTML = `<span>Pontos extras (criação): ${current.extraAttrPoints}</span><span>Restantes: ${remaining}</span>`;
}

function renderSkills(){
  const body = document.getElementById('skillsBody');
  body.innerHTML = '';
  SKILL_GROUPS.forEach(group=>{
    const title = document.createElement('div');
    title.className = 'skill-group-title';
    title.textContent = group.title;
    body.appendChild(title);
    group.skills.forEach(sk=>{
      body.appendChild(skillRow(sk, group.attr));
    });
  });
  // Combate Armado (coringa)
  const title = document.createElement('div');
  title.className = 'skill-group-title';
  title.textContent = 'Perícia Coringa';
  body.appendChild(title);
  const row = skillRow('Combate Armado', current.combateArmadoAttr, true);
  body.appendChild(row);

  const c = calc(current);
  const remaining = c.periciasDisp - c.periciasUsadas;
  const budgetEl = document.getElementById('skillBudget');
  budgetEl.className = 'budget-note' + (remaining<0?' warn':'');
  budgetEl.innerHTML = `<span>Perícias disponíveis: ${c.periciasDisp}</span><span>Restantes: ${remaining}</span>`;
}

function skillRow(name, attrKey, isJoker){
  const div = document.createElement('div');
  div.className = 'skill-row';
  const val = current.skills[name] || 0;
  const attrVal = current.attrs[attrKey];
  const tier = capTierLabel(val,'skill');
  let attrPicker = `<span class="skill-pool" style="min-width:34px;color:${tier.color}">${attrKey}</span>`;
  if(isJoker){
    attrPicker = `<select class="attr-pick" data-joker="1">
      <option value="FOR" ${attrKey==='FOR'?'selected':''}>FOR</option>
      <option value="DES" ${attrKey==='DES'?'selected':''}>DES</option>
    </select>`;
  }
  div.innerHTML = `
    <span class="skill-name">${name}</span>
    ${attrPicker}
    <span class="skill-pool">${attrVal}d12+${val}</span>
    <div class="skill-stepper">
      <button class="skill-step-btn" data-skill="${name}" data-d="-1">−</button>
      <span class="skill-val">${val}</span>
      <button class="skill-step-btn" data-skill="${name}" data-d="1">+</button>
    </div>
  `;
  div.querySelectorAll('.skill-step-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const d = Number(btn.dataset.d);
      current.skills[name] = Math.max(0, Math.min(9,(current.skills[name]||0)+d));
      renderSkills(); renderResources(); queueSave();
    });
  });
  const jokerSel = div.querySelector('[data-joker]');
  if(jokerSel){
    jokerSel.addEventListener('change', (e)=>{
      current.combateArmadoAttr = e.target.value;
      renderSkills(); queueSave();
    });
  }
  return div;
}

function renderResources(){
  const c = calc(current);

  // PV
  document.getElementById('pvArchBonus').value = current.pvArchBonus;
  document.getElementById('pvTalentBonus').value = current.pvTalentBonus;
  document.getElementById('pvCurrent').value = current.pvCurrent;
  document.getElementById('pvMaxTag').textContent = '/ '+c.pvMax;
  const pvPct = c.pvMax>0 ? Math.max(0,Math.min(100,(current.pvCurrent/c.pvMax)*100)) : 0;
  document.getElementById('pvFill').style.width = pvPct+'%';

  // Razão
  document.getElementById('razaoArchBonus').value = current.razaoArchBonus;
  document.getElementById('razaoTalentBonus').value = current.razaoTalentBonus;
  document.getElementById('razaoCurrent').value = current.razaoCurrent;
  document.getElementById('razaoMaxTag').textContent = '/ '+c.razaoMax;
  const razaoPct = c.razaoMax>0 ? Math.max(0,Math.min(100,(current.razaoCurrent/c.razaoMax)*100)) : 0;
  document.getElementById('razaoFill').style.width = razaoPct+'%';

  // Fardo
  document.getElementById('fardoCurrent').value = current.fardoCurrent;
  document.getElementById('fardoMaxTag').textContent = '/ '+c.fardoMax;
  const fardoPct = c.fardoMax>0 ? Math.max(0,Math.min(100,(current.fardoCurrent/c.fardoMax)*100)) : 0;
  document.getElementById('fardoFill').style.width = fardoPct+'%';

  // Defesa
  document.getElementById('defesaBadge').textContent = c.defesa;

  // Sticky bar
  document.getElementById('pvGaugeText').textContent = current.pvCurrent+'/'+c.pvMax;
  document.getElementById('pvGaugeFill').style.width = pvPct+'%';
  document.getElementById('razaoGaugeText').textContent = current.razaoCurrent+'/'+c.razaoMax;
  document.getElementById('razaoGaugeFill').style.width = razaoPct+'%';
  document.getElementById('grauBadge').textContent = 'Grau '+current.grau;

  // XP
  document.getElementById('xpFill').style.width = Math.max(0,Math.min(100,(current.xpAtual/c.xpProximo)*100))+'%';
  document.getElementById('xpNeed').textContent = '/ '+c.xpProximo;
}

function renderBasicInfo(){
  document.getElementById('charName').value = current.name;
  document.getElementById('race').value = current.race;
  document.getElementById('archetype').value = current.archetype;
  document.getElementById('past').value = current.past;
  document.getElementById('grau').value = current.grau;
  document.getElementById('xpAtual').value = current.xpAtual;
}

function renderAll(){
  renderBasicInfo();
  renderAttrs();
  renderSkills();
  renderResources();
}

// ============ EVENTOS: campos simples ============
function bindSimple(id, prop, isNumber){
  document.getElementById(id).addEventListener('input', (e)=>{
    current[prop] = isNumber ? (Number(e.target.value)||0) : e.target.value;
    if(id==='charName'){ syncIndexName(); }
    if(['grau','xpAtual'].includes(id)) renderResources();
    if(id==='grau') document.getElementById('grauBadge').textContent = 'Grau '+current.grau;
    queueSave();
  });
}
['race','archetype','past'].forEach(id=>bindSimple(id,id,false));
bindSimple('grau','grau',true);
bindSimple('xpAtual','xpAtual',true);
bindSimple('charName','name',false);

['pvCurrent','pvArchBonus','pvTalentBonus'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    const prop = id==='pvCurrent'?'pvCurrent':id;
    current[prop] = Number(e.target.value)||0;
    renderResources(); queueSave();
  });
});
['razaoCurrent','razaoArchBonus','razaoTalentBonus'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    const prop = id==='razaoCurrent'?'razaoCurrent':id;
    current[prop] = Number(e.target.value)||0;
    renderResources(); queueSave();
  });
});
document.getElementById('fardoCurrent').addEventListener('input', e=>{
  current.fardoCurrent = Number(e.target.value)||0;
  renderResources(); queueSave();
});

// ============ PAINEL DE PERSONAGENS ============
const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');
function openPanel(){ renderCharList(); overlay.classList.add('open'); panel.classList.add('open'); }
function closePanelFn(){ overlay.classList.remove('open'); panel.classList.remove('open'); }
document.getElementById('openMenu').addEventListener('click', openPanel);
document.getElementById('closePanel').addEventListener('click', closePanelFn);
overlay.addEventListener('click', closePanelFn);

function renderCharList(){
  const list = document.getElementById('charList');
  list.innerHTML = '';
  charIndex.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'char-item' + (current && item.id===current.id ? ' active' : '');
    div.innerHTML = `<span class="char-item-name">${item.name || 'Sem nome'}</span><button class="char-item-del" data-id="${item.id}">✕</button>`;
    div.addEventListener('click', (e)=>{
      if(e.target.classList.contains('char-item-del')) return;
      switchCharacter(item.id);
    });
    div.querySelector('.char-item-del').addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm('Excluir "'+(item.name||'este Caçador')+'"? Essa ação não pode ser desfeita.')) return;
      await deleteCharacter(item.id);
    });
    list.appendChild(div);
  });
}

async function switchCharacter(id){
  const data = await loadCharacter(id);
  if(data){
    current = data;
    // preenche skills novas que possam ter sido adicionadas depois
    SKILL_GROUPS.forEach(g=>g.skills.forEach(s=>{ if(!(s in current.skills)) current.skills[s]=0; }));
    if(!('Combate Armado' in current.skills)) current.skills['Combate Armado']=0;
    await window.storage.set('active-char', id, false);
    renderAll();
    closePanelFn();
  }
}

async function deleteCharacter(id){
  try{ await window.storage.delete('char-data:'+id, false); }catch(e){}
  charIndex = charIndex.filter(c=>c.id!==id);
  await saveIndex();
  if(current && current.id===id){
    if(charIndex.length>0){
      await switchCharacter(charIndex[0].id);
    }else{
      await createNewCharacter();
    }
  }
  renderCharList();
}

async function createNewCharacter(){
  const c = defaultCharacter('Novo Caçador');
  current = c;
  charIndex.push({id:c.id, name:c.name});
  await saveIndex();
  await saveCharacterNow();
  renderAll();
  renderCharList();
  closePanelFn();
}
document.getElementById('newCharBtn').addEventListener('click', createNewCharacter);

function syncIndexName(){
  const entry = charIndex.find(c=>c.id===current.id);
  if(entry){ entry.name = current.name; saveIndex(); }
}

// ============ INICIALIZAÇÃO ============
async function init(){
  await loadIndex();
  let activeId = null;
  try{
    const r = await window.storage.get('active-char', false);
    activeId = r ? r.value : null;
  }catch(e){}

  if(activeId && charIndex.find(c=>c.id===activeId)){
    current = await loadCharacter(activeId);
  }else if(charIndex.length>0){
    current = await loadCharacter(charIndex[0].id);
  }

  if(!current){
    current = defaultCharacter('Novo Caçador');
    charIndex = [{id:current.id, name:current.name}];
    await saveIndex();
    await saveCharacterNow();
  }else{
    SKILL_GROUPS.forEach(g=>g.skills.forEach(s=>{ if(!(s in current.skills)) current.skills[s]=0; }));
    if(!('Combate Armado' in current.skills)) current.skills['Combate Armado']=0;
  }

  renderAll();
}
init();
</script>
